server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Auth service: /api/auth/login → /v1/auth/login
  location /api/auth/ {
    rewrite ^/api/auth/(.*)$ /v1/auth/$1 break;
    proxy_pass http://auth-service:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Tenant service: /api/tenant/onboarding/register → /v1/onboarding/register
  location /api/tenant/ {
    rewrite ^/api/tenant/(.*)$ /v1/$1 break;
    proxy_pass http://tenant-service:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Core API: /api/core/products/... → /v1/products/...
  location /api/core/ {
    rewrite ^/api/core/(.*)$ /v1/$1 break;
    proxy_pass http://core-api:3003;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Order service: /api/orders/orders → /v1/orders
  location /api/orders/ {
    rewrite ^/api/orders/(.*)$ /v1/$1 break;
    proxy_pass http://order-service:3007;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Report service: /api/reports/... → /v1/...
  location /api/reports/ {
    rewrite ^/api/reports/(.*)$ /v1/$1 break;
    proxy_pass http://report-service:3008;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA routing — all other paths serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header X-XSS-Protection "1; mode=block";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript;
}
